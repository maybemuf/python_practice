name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # libmagic — потрібен python-magic (визначення типу файлу по байтах)
      - name: Install libmagic
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests (pytest)
        # тести ходять в in-memory SQLite (див. conftest), окремий Postgres не потрібен
        run: uv run pytest -q
