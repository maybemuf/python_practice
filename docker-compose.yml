services:
  db:
    image: postgres:17
    container_name: practice-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: practice
      POSTGRES_PASSWORD: practice
      POSTGRES_DB: practice
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U practice -d practice"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
