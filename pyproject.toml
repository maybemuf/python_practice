[project]
name = "practice"
version = "0.1.0"
description = "FastAPI REST API with JWT auth, refresh-token rotation, OTP flows and file storage."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "aiofiles>=25.1.0",
    "alembic>=1.18.4",
    "fastapi[standard]>=0.138.0",
    "psycopg[binary]>=3.3.4",
    "pwdlib[argon2]>=0.3.0",
    "pydantic-settings>=2.14.2",
    "pyjwt>=2.13.0",
    "python-magic>=0.4.27",
    "python-multipart>=0.0.32",
    "sqlmodel>=0.0.38",
]

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "ruff>=0.9.0",
]

[tool.setuptools]
packages = ["app"]

[tool.fastapi]
entrypoint = "app.main:app"

[tool.ruff]
target-version = "py313"
line-length = 100
# leave auto-generated migrations alone
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
# E/F — pyflakes+pycodestyle, I — isort, UP — pyupgrade, B — bugbear
select = ["E", "F", "I", "UP", "B"]
# catches dead imports such as `from sqlalchemy.orm import state`

[tool.pytest.ini_options]
testpaths = ["tests"]
